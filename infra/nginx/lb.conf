# ── Load balancer / edge ──────────────────────────────────────────────
# Single entry point for the whole demo:
#   /            -> web (static React bundle)
#   /api/...     -> API replicas (round-robin, stateless)
#   /socket.io/  -> realtime pods (STICKY via ip_hash — required for the
#                   HTTP long-polling handshake and WS upgrade)
# At Chess.com scale this maps to an L7 LB / ingress with sticky sessions and
# an HPA-scaled pool behind each upstream.

# NOTE: the API is NOT a static `upstream {}` block on purpose. Open-source nginx
# resolves `server api1;` names ONCE at startup and caches the IPs forever; a
# rebuild/scale gives the API containers new IPs, and the stale entry then points
# at whatever now holds the old IP — often an rt pod (same port, 404s everything
# but /health) — producing an intermittent 50/50 200/404 split. Instead we resolve
# a shared Docker DNS alias (`api` → api1 + api2, see docker-compose networks)
# at REQUEST time via the resolver below, so nginx always hits a live API.

upstream rt_pool {
  # realtime pods MUST be sticky so a client's polling + upgrade land on the
  # same pod. The redis-adapter still fans broadcasts across all three.
  ip_hash;
  server rt1:8080;
  server rt2:8080;
  server rt3:8080;
}

upstream web_pool {
  server web:80;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  # Docker's embedded DNS. `valid=10s` re-resolves so IP changes from a
  # rebuild/scale are picked up within seconds instead of being cached forever.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Tolerate fat cookies (localhost dev jars pile up across apps and overflow
  # nginx's default 8k header buffer → 400 "Request Header Or Cookie Too Large").
  large_client_header_buffers 8 32k;
  client_header_buffer_size 16k;

  # REST API — resolve the `api` alias dynamically (see note above). The rewrite
  # strips the /api prefix so the API serves its routes at root (/events, /feed,
  # ...); putting the target in a variable forces per-request DNS resolution.
  location /api/ {
    set $api_backend api:8080;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
  }

  # Realtime — WebSocket upgrade + sticky pool.
  location /socket.io/ {
    proxy_pass http://rt_pool;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Everything else — the static SPA.
  location / {
    proxy_pass http://web_pool;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
