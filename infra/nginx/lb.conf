# ── Load balancer / edge ──────────────────────────────────────────────
# Single entry point for the whole demo:
#   /            -> web (static React bundle)
#   /api/...     -> API replicas (round-robin, stateless)
#   /socket.io/  -> realtime pods (STICKY via ip_hash — required for the
#                   HTTP long-polling handshake and WS upgrade)
# At Chess.com scale this maps to an L7 LB / ingress with sticky sessions and
# an HPA-scaled pool behind each upstream.

upstream api_pool {
  # stateless API — plain round-robin across replicas
  server api1:8080;
  server api2:8080;
  keepalive 32;
}

upstream rt_pool {
  # realtime pods MUST be sticky so a client's polling + upgrade land on the
  # same pod. The redis-adapter still fans broadcasts across all three.
  ip_hash;
  server rt1:8080;
  server rt2:8080;
  server rt3:8080;
}

upstream web_pool {
  server web:80;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  # REST API — trailing slash on proxy_pass strips the /api prefix, so the
  # API service serves its routes at root (/events, /feed, ...).
  location /api/ {
    proxy_pass http://api_pool/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
  }

  # Realtime — WebSocket upgrade + sticky pool.
  location /socket.io/ {
    proxy_pass http://rt_pool;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Everything else — the static SPA.
  location / {
    proxy_pass http://web_pool;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
