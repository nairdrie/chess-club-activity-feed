# ── Load balancer / edge ──────────────────────────────────────────────
# Single entry point for the demo:
#   /            -> web (static SPA)
#   /api/...     -> API replicas
#   /socket.io/  -> realtime pods (WebSocket)
#
# WHY NO static `upstream { server api1; ... }` for api/rt: open-source nginx
# resolves those names ONCE at startup and caches the IPs. After a rebuild/scale
# the containers get new IPs and the cached entry points at whatever now holds the
# old IP — an rt pod 404s /api (same port, 404s everything but /health); a stale rt
# IP fails the socket handshake ("Reconnecting..."). Instead we resolve a shared
# Docker DNS alias PER request/connection via the resolver below:
#   api -> api1 + api2      (see docker-compose networks)
#   rt  -> rt1 + rt2 + rt3
# The alias can only ever map to the right service, and new IPs are picked up
# within `valid`. Realtime is WebSocket-only (client + here), so no sticky sessions
# are needed — a single WS connection stays on one pod and the redis-adapter fans
# broadcasts across all pods.

upstream web_pool {
  server web:80;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  # Docker's embedded DNS; re-resolve aliases every 10s.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Tolerate fat cookies (localhost dev jars pile up across apps and overflow
  # nginx's default 8k header buffer → 400 "Request Header Or Cookie Too Large").
  large_client_header_buffers 8 32k;
  client_header_buffer_size 16k;

  # REST API — resolve the `api` alias dynamically, strip the /api prefix (the API
  # serves its routes at root). Retry the other replica if one is briefly unhealthy
  # or an IP is momentarily stale (an rt pod would answer 404).
  location /api/ {
    set $api_backend api:8080;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$api_backend;
    proxy_next_upstream error timeout http_502 http_404 non_idempotent;
    proxy_next_upstream_tries 2;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
  }

  # Realtime — resolve the `rt` alias dynamically. WebSocket upgrade; no sticky
  # sessions needed because the client is WebSocket-only (single long-lived conn).
  location /socket.io/ {
    set $rt_backend rt:8080;
    proxy_pass http://$rt_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Everything else — the static SPA.
  location / {
    proxy_pass http://web_pool;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
