# ── Load balancer / edge ──────────────────────────────────────────────
# Single entry point for the whole demo:
#   /            -> web (static React bundle)
#   /api/...     -> API replicas (round-robin, stateless)
#   /socket.io/  -> realtime pods (STICKY via ip_hash — required for the
#                   HTTP long-polling handshake and WS upgrade)
# At Chess.com scale this maps to an L7 LB / ingress with sticky sessions and
# an HPA-scaled pool behind each upstream.

# API upstream keyed on the shared Docker DNS alias `api` (api1 + api2 hold it,
# see docker-compose networks). nginx resolves it at startup and adds ALL returned
# addresses as balanced servers — so we get round-robin across both replicas AND
# keepalive connection reuse (essential for throughput). Using the alias (never the
# per-replica names api1/api2) is what avoids the stale-IP 404: the alias can only
# ever map to real API containers, never an rt pod. `make up/reset/scale` recreate
# the LB (lb-refresh) so a rebuild's new IPs are re-resolved.
upstream api_pool {
  server api:8080;
  keepalive 32;
}

upstream rt_pool {
  # realtime pods MUST be sticky so a client's polling + upgrade land on the
  # same pod. The redis-adapter still fans broadcasts across all three.
  ip_hash;
  server rt1:8080;
  server rt2:8080;
  server rt3:8080;
}

upstream web_pool {
  server web:80;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  # Tolerate fat cookies (localhost dev jars pile up across apps and overflow
  # nginx's default 8k header buffer → 400 "Request Header Or Cookie Too Large").
  large_client_header_buffers 8 32k;
  client_header_buffer_size 16k;

  # REST API — trailing slash on proxy_pass strips the /api prefix, so the API
  # serves its routes at root (/events, /feed, ...). keepalive reuse comes from
  # the upstream block above (Connection "" lets nginx pool upstream conns).
  location /api/ {
    proxy_pass http://api_pool/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
  }

  # Realtime — WebSocket upgrade + sticky pool.
  location /socket.io/ {
    proxy_pass http://rt_pool;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Everything else — the static SPA.
  location / {
    proxy_pass http://web_pool;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
